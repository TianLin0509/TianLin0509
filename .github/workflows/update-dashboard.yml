name: Update stats dashboard

on:
  schedule:
    - cron: "17 22 * * *"   # 每天 22:17 UTC ≈ 北京时间次日 06:17
  workflow_dispatch:          # 支持在 Actions 页面手动触发

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate dashboard SVG
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/generate_dashboard.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats-dashboard.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh github stats dashboard"
            git push
          fi
